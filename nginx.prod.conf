events {}

http {

    upstream backend {
        server app:8000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name prop-tech.live api.prop-tech.live;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name prop-tech.live api.prop-tech.live;

        ssl_certificate /etc/letsencrypt/live/prop-tech.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prop-tech.live/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}